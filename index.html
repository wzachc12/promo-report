<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promo Performance Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --bg:#f7f6f3;--surface:#fff;--surface2:#f2f1ed;
  --border:rgba(0,0,0,0.09);--border-med:rgba(0,0,0,0.16);
  --text:#1a1916;--text2:#6b6a66;--text3:#a8a7a3;
  --accent:#2a5caa;--accent-bg:#edf2fb;
  --green:#1a7a52;--green-bg:#e8f5ee;
  --red:#b83030;--red-bg:#fbeaea;
  --amber:#8a5c00;--amber-bg:#fef3e2;
  --radius:10px;--radius-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
.logo{font-size:15px;font-weight:500;letter-spacing:-0.01em;display:flex;align-items:center;gap:8px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.header-meta{font-size:11px;color:var(--text3);font-family:"DM Mono",monospace}
.main{max-width:1160px;margin:0 auto;padding:1.5rem 1.5rem}
.filters-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:1.25rem}
.filter-group{display:flex;flex-direction:column;gap:5px}
.filter-label{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-family:"DM Mono",monospace}
select{width:100%;padding:7px 10px;font-size:13px;font-family:"DM Sans",sans-serif;border:1px solid var(--border-med);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);cursor:pointer;outline:none}
select:focus{border-color:var(--accent)}
.tab-bar{display:flex;border-bottom:1px solid var(--border);margin-bottom:1.25rem;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{height:0}
.tab{padding:9px 16px;cursor:pointer;font-size:13px;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .12s;white-space:nowrap;flex-shrink:0}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text);font-weight:500;border-bottom-color:var(--text)}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1.25rem}
.tbl-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead th{text-align:right;padding:8px 7px;font-weight:500;font-size:11px;color:var(--text3);border-bottom:1px solid var(--border);white-space:nowrap;font-family:"DM Mono",monospace;letter-spacing:.03em;background:var(--surface)}
thead th.left,td.left{text-align:left}
td{padding:8px 7px;border-bottom:1px solid var(--border);text-align:right;white-space:nowrap}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--surface2)}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500;font-family:"DM Mono",monospace;vertical-align:middle}
.badge-elec{background:var(--accent-bg);color:var(--accent)}
.badge-appl{background:var(--green-bg);color:var(--green)}
.badge-furn{background:#f0eefe;color:#4a3faa}
.badge-lawn{background:#eaf5e0;color:#2e6b1a}
.badge-other{background:var(--surface2);color:var(--text2)}
.status-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500;white-space:nowrap}
.status-live{background:#e8f5ee;color:#1a7a52}
.status-live::before{content:"";display:inline-block;width:6px;height:6px;border-radius:50%;background:#1a7a52;animation:pulse 1.5s infinite}
.status-complete{background:var(--surface2);color:var(--text2)}
.status-upcoming{background:var(--amber-bg);color:var(--amber)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.mono{font-family:"DM Mono",monospace}
.no-data{text-align:center;padding:3rem;color:var(--text3);font-size:13px}
.heatmap-key{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);margin-bottom:12px}
.hk-bar{display:flex;height:8px;width:100px;border-radius:4px;overflow:hidden}
.hk-seg{flex:1}
.data-note{font-size:11px;color:var(--text3);padding:8px 0 0;text-align:right}
.delta-up{color:var(--green);font-size:11px}
.delta-down{color:var(--red);font-size:11px}
.delta-flat{color:var(--text3);font-size:11px}
.bar-bg{background:var(--border);border-radius:2px;height:3px;margin-top:3px}
.bar-fill{background:var(--accent);border-radius:2px;height:3px}

/* ── Executive Summary ── */
.ytd-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
.ytd-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.ytd-label{font-size:11px;color:var(--text3);font-family:"DM Mono",monospace;margin-bottom:4px}
.ytd-val{font-size:26px;font-weight:500;letter-spacing:-0.02em;line-height:1}
.ytd-sub{font-size:11px;color:var(--text2);margin-top:3px}
.exec-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:1.5rem}
.exec-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem}
.exec-card-title{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-family:"DM Mono",monospace;margin-bottom:10px}
.promo-timeline{display:flex;flex-direction:column;gap:6px}
.tl-row{display:flex;align-items:center;gap:10px;font-size:12px}
.tl-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.tl-bar-wrap{width:120px;flex-shrink:0}
.tl-bar-track{background:var(--surface2);border-radius:2px;height:6px;position:relative;overflow:hidden}
.tl-bar-prog{height:6px;border-radius:2px;background:var(--accent)}
.tl-pct{font-size:11px;color:var(--text2);width:38px;text-align:right;flex-shrink:0;font-family:"DM Mono",monospace}
.top-bottom{display:flex;flex-direction:column;gap:6px}
.tb-row{display:flex;align-items:baseline;justify-content:space-between;gap:8px;font-size:12px;padding:6px 0;border-bottom:1px solid var(--border)}
.tb-row:last-child{border-bottom:none}
.tb-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;color:var(--text)}
.tb-val{font-family:"DM Mono",monospace;font-size:12px;font-weight:500;flex-shrink:0}
.trend-chart-wrap{position:relative;height:180px;width:100%}
.section-title{font-size:13px;font-weight:500;margin-bottom:12px}
.pill{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-family:"DM Mono",monospace;padding:2px 6px;border-radius:3px;font-weight:500}
.pill-up{background:#e8f5ee;color:#1a7a52}
.pill-down{background:#fbeaea;color:#b83030}
.pill-flat{background:var(--surface2);color:var(--text2)}

/* ── Asset tab ── */
.asset-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-bottom:1.5rem}
.asset-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.1rem}
.asset-card-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:2px}
.asset-card-name{font-size:13px;font-weight:500}
.asset-card-ctr{font-size:22px;font-weight:500;letter-spacing:-0.02em;line-height:1.1;margin-bottom:2px}
.asset-card-sub{font-size:11px;color:var(--text2);margin-bottom:10px}
.sparkline-wrap{position:relative;height:52px}
.section-divider{border:none;border-top:1px solid var(--border);margin:1.5rem 0}
.hm-table{font-size:11.5px;min-width:600px}
.hm-table th{font-size:10px;padding:6px 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px}
.hm-table td{padding:6px 5px;font-size:11px;font-family:"DM Mono",monospace;font-weight:500}

@media(max-width:700px){.ytd-strip{grid-template-columns:repeat(2,1fr)}.exec-grid{grid-template-columns:1fr}.filters-bar{grid-template-columns:1fr}.main{padding:1rem}}
</style>
</head>

</div>

const TODAY=new Date(2026,5,8);// June 8 2026 in local time (month is 0-indexed)
const MATURITY_DAYS=14;// Promotions started less than this many days ago are excluded from reporting

function isMature(startStr){
  // Returns true if the promo started >= MATURITY_DAYS ago
  const s=parseDate(startStr);
  if(!s) return true;
  const diffDays=Math.round((TODAY-s)/(1000*60*60*24));
  return diffDays>=MATURITY_DAYS;
}

let filtered=[],activeTab="exec",chartInst=null,sparkCharts=[],trendChart=null;

function n(v){return parseFloat(v)||0}
function pct(v){return parseFloat((v||"").replace("%",""))||0}
function fmt(v,d=1){return(v===null||v===undefined||isNaN(v))?"—":Number(v).toFixed(d)}
function fmtN(v){return n(v).toLocaleString()}
function parseDate(s){if(!s)return null;const[m,d,y]=s.split("/");return new Date(+y,+m-1,+d)}

function promoStatus(startStr,endStr){
  const s=parseDate(startStr),e=parseDate(endStr);
  if(!s||!e)return{status:"unknown",label:"Unknown",daysLeft:null};
  const t=new Date(TODAY);t.setHours(0,0,0,0);
  const end=new Date(e);end.setHours(23,59,59,999);
  if(t<s){
    const diff=Math.round((s-t)/(1000*60*60*24));
    return{status:"upcoming",label:`In ${diff}d`,daysLeft:diff};
  }
  if(t<=end){
    const diff=Math.round((end-t)/(1000*60*60*24));
    return{status:"live",label:`${diff}d left`,daysLeft:diff};
  }
  return{status:"complete",label:"Complete",daysLeft:null};
}

function promoStatusBadge(startStr,endStr){
  const{status,label}=promoStatus(startStr,endStr);
  if(status==="live") return`<span class="status-badge status-live">Live · ${label}</span>`;
  if(status==="upcoming") return`<span class="status-badge status-upcoming">Upcoming · ${label}</span>`;
  return`<span class="status-badge status-complete">Complete</span>`;
}

function init(){
  // Build promo list with dates from ALL_ROWS
  const promoMeta={};
  ALL_ROWS.forEach(r=>{
    const p=r["Promotion"];
    if(!promoMeta[p]) promoMeta[p]={start:r["Start Date"],end:r["End Date"]};
  });
  const promos=Object.keys(promoMeta).sort((a,b)=>{
    const da=parseDate(promoMeta[a].start),db=parseDate(promoMeta[b].start);
    return da-db;
  });
  const cats=[...new Set(ALL_ROWS.map(r=>r["Category"]).filter(Boolean))].sort();
  const fp=document.getElementById("f-promo");
  fp.innerHTML='<option value="">All promotions</option>'+promos.map(p=>{
    const{status,label}=promoStatus(promoMeta[p].start,promoMeta[p].end);
    const indicator=status==="live"?"● ":status==="upcoming"?"◌ ":"";
    return`<option value="${p}">${indicator}${p}</option>`;
  }).join("");
  document.getElementById("f-cat").innerHTML='<option value="">All categories</option>'+cats.map(c=>`<option value="${c}">${c}</option>`).join("");
  updateSubcats("");
  document.getElementById("data-note").textContent=`${ALL_ROWS.length} SKUs · ${promos.length} promotions · YTD 2026`;
  document.getElementById("hdr-meta").textContent="Data as of "+TODAY.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
  applyFilters();
}

function updateSubcats(cat){
  const subs=[...new Set(ALL_ROWS.filter(r=>!cat||r["Category"]===cat).map(r=>r["Sub-Category"]).filter(Boolean))].sort();
  document.getElementById("f-sub").innerHTML='<option value="">All sub-categories</option>'+subs.map(s=>`<option value="${s}">${s}</option>`).join("");
}

function applyFilters(){
  const fp=document.getElementById("f-promo").value;
  const fc=document.getElementById("f-cat").value;
  const fs=document.getElementById("f-sub").value;
  updateSubcats(fc);
  filtered=ALL_ROWS.filter(r=>
    (!fp||r["Promotion"]===fp)&&(!fc||r["Category"]===fc)&&(!fs||r["Sub-Category"]===fs)&&
    (n(r["Applications Started"])>0||n(r["Gross Orders"])>0||n(r["Deliveries"])>0)&&
    isMature(r["Start Date"])
  );
  renderActiveTab();
}

function showTab(t){
  activeTab=t;
  ["exec","assets","promo","sku","track","promosum","catsum","skurank"].forEach(id=>{
    document.getElementById("view-"+id).style.display=id===t?"block":"none";
    document.getElementById("tab-"+id).className="tab"+(id===t?" active":"");
  });
  renderActiveTab();
}

function renderActiveTab(){
  if(activeTab==="exec") renderExec();
  else if(activeTab==="assets") renderAssetsTab();
  else if(activeTab==="promo") renderPromoView();
  else if(activeTab==="sku") renderSKUView();
  else if(activeTab==="track") renderTrackView();
  else if(activeTab==="promosum") renderPromoSum();
  else if(activeTab==="catsum") renderCatSum();
  else if(activeTab==="skurank") renderSKURank();
}

function heatColor(val,min,max){
  if(max===min||val===null)return"background:transparent";
  const t=(val-min)/(max-min);
  let r,g,b;
  if(t>0.5){const s=(t-0.5)*2;r=Math.round(138+(26-138)*s);g=Math.round(96+(122-96)*s);b=Math.round(0+(82-0)*s);}
  else{const s=t*2;r=Math.round(184+(138-184)*s);g=Math.round(48+(96-48)*s);b=Math.round(48+(0-48)*s);}
  const lum=0.299*r+0.587*g+0.114*b;
  return`background:rgb(${r},${g},${b});color:${lum>140?"#1a1916":"#fff"}`;
}
function heatCell(val,min,max,display){
  return`<td style="text-align:right;${heatColor(val,min,max)};padding:8px 7px;font-weight:500">${display}</td>`;
}
function heatKey(){
  return`<div class="heatmap-key"><span style="color:var(--red)">Low</span><div class="hk-bar">
    <div class="hk-seg" style="background:rgb(184,48,48)"></div><div class="hk-seg" style="background:rgb(161,72,24)"></div>
    <div class="hk-seg" style="background:rgb(138,96,0)"></div><div class="hk-seg" style="background:rgb(82,109,41)"></div>
    <div class="hk-seg" style="background:rgb(26,122,82)"></div>
  </div><span style="color:var(--green)">High</span><span style="margin-left:12px;color:var(--text3)">Colour is relative within each row (normalized to each placement's own range)</span></div>`;
}

function deltaHtml(curr,prev,suffix="%"){
  if(!prev||prev===0)return"";
  const d=((curr-prev)/prev*100);
  const cls=d>0?"delta-up":d<0?"delta-down":"delta-flat";
  const arrow=d>0?"↑":d<0?"↓":"→";
  return`<span class="${cls}">${arrow}${Math.abs(d).toFixed(1)}%</span>`;
}

/* ── Rollup helpers ── */
function rollupByPromo(rows){
  const map={};
  rows.forEach(r=>{
    const k=r["Promotion"];
    if(!map[k])map[k]={name:k,apps:0,orders:0,del:0,days:n(r["Number of Promo Days"]),start:r["Start Date"],end:r["End Date"],skus:0};
    map[k].apps+=n(r["Applications Started"]);map[k].orders+=n(r["Gross Orders"]);map[k].del+=n(r["Deliveries"]);map[k].skus++;
  });
  return Object.values(map).map(p=>({...p,
    apd:p.days>0?p.apps/p.days:0,opd:p.days>0?p.orders/p.days:0,
    aoRate:p.apps>0?p.orders/p.apps*100:0,
    odRate:p.orders>0?p.del/p.orders*100:0,
    ffRate:p.apps>0?p.del/p.apps*100:0,
  })).sort((a,b)=>parseDate(a.start)-parseDate(b.start));
}

function catBadge(cat){
  const c=(cat||"").toLowerCase();let cls="badge-other";
  if(c.includes("elect"))cls="badge-elec";else if(c.includes("appl"))cls="badge-appl";
  else if(c.includes("furn"))cls="badge-furn";else if(c.includes("lawn"))cls="badge-lawn";
  return`<span class="badge ${cls}">${cat}</span>`;
}

    borderWidth:2,pointRadius:3,pointHoverRadius:5,tension:0.3,spanGaps:true,
  }));

  // Per-asset min/max for normalized heatmap (each row colored relative to its own range)
  const assetCtrRanges=assetRows.map(a=>{
    const ctrs=a.data.map(d=>d.ctr).filter(v=>v!==null);
    return ctrs.length?{min:Math.min(...ctrs),max:Math.max(...ctrs)}:{min:0,max:0};
  });

  const hmHeaders=promos.map((p,i)=>{
    const isSel=i===selIdx&&selIdx>=0;
    const st=isSel?`text-align:center;max-width:70px;font-size:9.5px;white-space:normal;line-height:1.2;background:var(--accent-bg);color:var(--accent);border-bottom:2px solid var(--accent)`:
      `text-align:center;max-width:70px;font-size:9.5px;white-space:normal;line-height:1.2`;
    return`<th style="${st}">${isSel?"▼ ":""}${shortLabels[i]}</th>`;
  }).join("");

  const hmRows=assetRows.map((a,ai)=>{
    const {min:rowMin,max:rowMax}=assetCtrRanges[ai];
    const cells=a.data.map((d,i)=>{
      const isSel=i===selIdx&&selIdx>=0;
      if(d.ctr===null)return`<td style="text-align:center;color:var(--text3);font-size:10px;${isSel?"background:var(--accent-bg)":""}">—</td>`;
      const prev=i>0?a.data.slice(0,i).reverse().find(x=>x.ctr!==null):null;
      const chg=(isSel&&prev&&prev.ctr!==0)?((d.ctr-prev.ctr)/prev.ctr*100):null;
      const chgHtml=chg!==null?`<div style="font-size:9px;margin-top:2px;font-weight:400;color:${chg>0?"#1a7a52":"#b83030"}">${chg>0?"+":""}${chg.toFixed(1)}% vs prior</div>`:"";
      const outline=isSel?"outline:2px solid var(--accent);outline-offset:-2px;":"";
      return`<td style="text-align:center;${heatColor(d.ctr,rowMin,rowMax)};padding:5px 4px;${outline}"><div style="font-size:11px;font-weight:500">${fmt(d.ctr)}%</div>${chgHtml}</td>`;
    }).join("");
    return`<tr><td class="left" style="font-weight:500;font-size:12px;white-space:nowrap;padding-right:12px"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${palette[ai]};margin-right:6px"></span>${a.name}</td>${cells}</tr>`;
  }).join("");

  const promoNote=displayIdx>=0
    ? selectedPromo
      ? `Showing CTR for <strong>${effectivePromo}</strong> with % change vs prior promo.`
      : `Showing CTR for live promo <strong>${effectivePromo}</strong> with % change vs prior promo.`
    : `Click and CTR performance for each homepage asset across all promotions YTD.`;

  // Overall CTR banner from Total row
  let overallBanner="";
  if(totalRow){
    const totalCtrs=totalRow.data.map(d=>d.ctr).filter(v=>v!==null);
    const avgTotalCtr=totalCtrs.length?totalCtrs.reduce((s,v)=>s+v,0)/totalCtrs.length:0;
    const totalClicks=totalRow.data.reduce((s,d)=>s+(d.clicks||0),0);
    let selectedCtrHtml="";
    if(displayIdx>=0&&displayIdx<totalRow.data.length&&totalRow.data[displayIdx].ctr!==null){
      const selCtr=totalRow.data[displayIdx].ctr;
      const prevEntry=displayIdx>0?totalRow.data.slice(0,displayIdx).reverse().find(x=>x.ctr!==null):null;
      const chg=(prevEntry&&prevEntry.ctr!==0)?((selCtr-prevEntry.ctr)/prevEntry.ctr*100):null;
      const chgHtml=chg!==null?`<span style="font-size:12px;margin-left:8px;color:${chg>0?"var(--green)":"var(--red)"}">${chg>0?"↑":"↓"}${Math.abs(chg).toFixed(1)}% vs prior</span>`:"";
      selectedCtrHtml=`<span style="font-size:13px;color:var(--text2);margin-left:16px;padding-left:16px;border-left:1px solid var(--border)">This promo: <strong style="font-size:22px;font-weight:500;letter-spacing:-0.01em">${fmt(selCtr)}%</strong>${chgHtml}</span>`;
    }
    overallBanner=`<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;margin-bottom:1.25rem;display:flex;align-items:center;flex-wrap:wrap;gap:4px">
      <div>
        <div style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em">Overall Homepage CTR</div>
        <div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap">
          <span style="font-size:28px;font-weight:500;letter-spacing:-0.02em">${fmt(avgTotalCtr)}%</span>
          <span style="font-size:12px;color:var(--text2)">YTD avg &nbsp;·&nbsp; ${totalClicks.toLocaleString()} total clicks &nbsp;·&nbsp; ${totalCtrs.length} promos</span>
          ${selectedCtrHtml}
        </div>
      </div>
    </div>`;
  }

  el.innerHTML=`<p style="font-size:12px;font-weight:500;margin-bottom:10px">AI-generated asset insights</p><div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem 1.5rem;font-size:13.5px;line-height:1.8;margin-bottom:1.5rem"><div style="margin-bottom:10px"><span style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace">5 INSIGHTS · Based on 90 asset-promo data points · Generated June 8, 2026</span></div><div style="padding:10px 0;border-bottom:1px solid var(--border)"><span style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-right:8px">01</span><span style="font-weight:500;color:var(--text)">Promotional art dominates CTR across all placements.</span> <span style="color:var(--text2)">Promotional-type creative averages 16.6% CTR — nearly double Product-focused (8.8%) and triple Category-focused (5.3%). The Hot Deals Hero (24.2%) and Pre-Tax Hero (24.0%) are the two highest-performing assets YTD, both Promotional.</span></div><div style="padding:10px 0;border-bottom:1px solid var(--border)"><span style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-right:8px">02</span><span style="font-weight:500;color:var(--text)">Generic creative dramatically outperforms on LTD slots.</span> <span style="color:var(--text2)">Generic art averages 14.1% CTR on LTD 1 — the highest of any art type on that slot — compared to 3.4% for Product-focused. For secondary placements, a clean generic treatment appears to reduce friction better than product imagery.</span></div><div style="padding:10px 0;border-bottom:1px solid var(--border)"><span style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-right:8px">03</span><span style="font-weight:500;color:var(--text)">The Homepage Hero outperforms all LTD slots regardless of art type.</span> <span style="color:var(--text2)">Even the lowest-performing Hero creative (Product-focused, avg 18.7%) exceeds the best-performing LTD 1 creative (Generic, avg 14.1%). Placement position has a larger effect on CTR than creative type.</span></div><div style="padding:10px 0;border-bottom:1px solid var(--border)"><span style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-right:8px">04</span><span style="font-weight:500;color:var(--text)">Brand-focused creative is consistently the weakest performer.</span> <span style="color:var(--text2)">Brand-focused art averages just 2.3% CTR overall — the lowest of any art type — and underperforms the placement average on every slot it appears in across LTD 2, 3, and 4.</span></div><div style="padding:10px 0;border-bottom:1px solid var(--border)"><span style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-right:8px">05</span><span style="font-weight:500;color:var(--text)">Category-focused is the most-used art type but middle-of-pack on performance.</span> <span style="color:var(--text2)">With 28 instances, Category-focused is the most frequently deployed creative type, yet it averages 5.3% CTR — well below Promotional and Product-focused. Its strongest performance is on LTD 2 (6.8%), suggesting category imagery works better on secondary slots.</span></div></div><hr class="section-divider">${overallBanner}
    ${selIdx>=0?`<p style="font-size:12px;color:var(--text2);margin-bottom:1rem">${promoNote}</p>`:""}
    ${selIdx>=0?`<div class="asset-grid">${cards}</div>`:''}
    ${selIdx<0?`<hr class="section-divider">
    <p style="font-size:12px;font-weight:500;margin-bottom:10px">CTR trend across promotions</p>
    <div style="display:flex;flex-wrap:wrap;gap:12px;margin-bottom:10px;font-size:12px;color:var(--text2)">
      ${assetRows.map((a,ai)=>`<span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:3px;border-radius:1px;background:${palette[ai]};display:inline-block"></span>${a.name}</span>`).join("")}
    </div>
    <div style="position:relative;width:100%;height:260px;margin-bottom:1.5rem">
      <canvas id="line-chart"></canvas>
    </div>
    <hr class="section-divider">
    <p style="font-size:12px;font-weight:500;margin-bottom:6px">CTR heatmap by asset &amp; promotion</p>
    ${heatKey()}
    <div class="tbl-scroll"><table class="hm-table">
      <thead><tr><th class="left" style="min-width:140px">Asset</th>${hmHeaders}</tr></thead>
      <tbody>${hmRows}</tbody>
    </table></div>`:''}`;

  setTimeout(()=>{
    assetRows.forEach((a,ai)=>{
      const canvas=document.getElementById("spark-"+ai);if(!canvas)return;
      const ptColors=a.data.map((_,i)=>i===displayIdx?"#f59e0b":palette[ai]);
      const ptSizes=a.data.map((_,i)=>i===displayIdx?5:0);
      const sc=new Chart(canvas,{type:"line",data:{labels:shortLabels,datasets:[{data:a.data.map(d=>d.ctr),borderColor:palette[ai],borderWidth:1.5,pointRadius:ptSizes,pointBackgroundColor:ptColors,tension:0.3,spanGaps:true,fill:true,backgroundColor:palette[ai]+"18"}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{display:false},y:{display:false}},animation:{duration:0}}});
      sparkCharts.push(sc);
    });
    const lcEl=document.getElementById("line-chart");
    if(lcEl){const lc=new Chart(lcEl,{type:"line",data:{labels:shortLabels,datasets:lineDatasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{mode:"index",intersect:false,callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y!==null?c.parsed.y.toFixed(2)+"%":"—"}`}}},scales:{x:{ticks:{font:{size:10,family:"DM Sans,sans-serif"},maxRotation:40,autoSkip:false}},y:{ticks:{callback:v=>v+"%"},title:{display:true,text:"CTR %",font:{size:11}}}}}});
    sparkCharts.push(lc);}
  },50);
  if(selIdx<0) el.innerHTML += buildArtTypeBreakdown(assetRows,selIdx);
}

   TAB 3: PROMO VS PROMO

function renderPromoView(){
  const el=document.getElementById("view-promo");
  const data=rollupByPromo(filtered);
  if(!data.length){el.innerHTML='<div class="no-data">No data for current filters.</div>';return;}
  const ffV=data.map(p=>p.ffRate),aoV=data.map(p=>p.aoRate),odV=data.map(p=>p.odRate);
  const maxFF=Math.max(...ffV),minFF=Math.min(...ffV),maxAO=Math.max(...aoV),minAO=Math.min(...aoV),maxOD=Math.max(...odV),minOD=Math.min(...odV);

  const rows=data.map((p,i)=>{
    const prev=i>0?data[i-1]:null;
    const ffDelta=prev?deltaHtml(p.ffRate,prev.ffRate):"";
    const aoDelta=prev?deltaHtml(p.aoRate,prev.aoRate):"";
    const barW=maxFF>0?Math.round(p.ffRate/maxFF*100):0;
    const name=p.name.length>38?p.name.slice(0,36)+"…":p.name;
    const{status}=promoStatus(p.start,p.end);
    const statusDot=status==="live"?`<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:5px;vertical-align:middle"></span>`:
      status==="upcoming"?`<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--amber);margin-right:5px;vertical-align:middle"></span>`:"";
    return`<tr>
      <td class="left" title="${p.name}" style="max-width:220px;overflow:hidden;text-overflow:ellipsis">${statusDot}${name}</td>
      <td class="left">${promoStatusBadge(p.start,p.end)}</td>
      <td class="mono">${p.days}d</td><td>${p.skus}</td>
      <td>${p.apps.toLocaleString()}</td><td>${fmt(p.apd)}</td>
      <td>${p.orders.toLocaleString()}</td>
      <td>${heatColor(aoV[i],minAO,maxAO)?`<span style="${heatColor(aoV[i],minAO,maxAO)};padding:2px 6px;border-radius:3px;font-size:12px">${fmt(aoV[i])}%</span>`:fmt(aoV[i])+"%"} ${aoDelta}</td>
      <td>${p.del.toLocaleString()}</td>
      <td>${heatColor(odV[i],minOD,maxOD)?`<span style="${heatColor(odV[i],minOD,maxOD)};padding:2px 6px;border-radius:3px;font-size:12px">${fmt(odV[i])}%</span>`:fmt(odV[i])+"%"}</td>
      <td><div style="display:flex;align-items:center;gap:6px"><span style="font-family:'DM Mono',monospace">${fmt(p.ffRate)}%</span>${ffDelta}</div><div class="bar-bg"><div class="bar-fill" style="width:${barW}%"></div></div></td>
    </tr>`;
  }).join("");

  el.innerHTML=`
    <p style="font-size:12px;color:var(--text2);margin-bottom:10px">Sorted chronologically. Arrows show change vs prior promotion.</p>
    <div style="display:flex;flex-wrap:wrap;gap:14px;margin-bottom:10px;font-size:12px;color:var(--text2)">
      <span style="display:flex;align-items:center;gap:5px"><span style="width:9px;height:9px;border-radius:2px;background:#2a5caa;display:inline-block"></span>Full funnel %</span>
      <span style="display:flex;align-items:center;gap:5px"><span style="width:9px;height:9px;border-radius:2px;background:#1a7a52;display:inline-block"></span>App→order %</span>
      <span style="display:flex;align-items:center;gap:5px"><span style="width:9px;height:9px;border-radius:2px;background:#c0392b;display:inline-block"></span>Order→del %</span>
    </div>
    <div style="position:relative;width:100%;height:${Math.max(200,data.length*40+60)}px;margin-bottom:1.5rem">
      <canvas id="promo-chart"></canvas>
    </div>
    <div class="tbl-scroll"><table>
      <thead><tr>
        <th class="left" style="min-width:180px">Promotion</th><th class="left">Status</th>
        <th>Days</th><th>SKUs</th><th>Apps</th><th>Apps/day</th>
        <th>Orders</th><th>App→order</th><th>Deliveries</th><th>Order→del</th><th>Full funnel</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;

  setTimeout(()=>{
    if(chartInst){chartInst.destroy();chartInst=null;}
    chartInst=new Chart(document.getElementById("promo-chart"),{
      type:"bar",
      data:{labels:data.map(p=>p.name.length>28?p.name.slice(0,26)+"…":p.name),datasets:[
        {label:"Full funnel %",data:ffV,backgroundColor:"#2a5caa"},
        {label:"App→order %",data:aoV,backgroundColor:"#1a7a52"},
        {label:"Order→del %",data:odV,backgroundColor:"#c0392b"},
      ]},
      options:{indexAxis:"y",responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.x.toFixed(1)}%`}}},scales:{x:{ticks:{callback:v=>v+"%"},max:100},y:{ticks:{font:{size:10,family:"DM Sans,sans-serif"},autoSkip:false}}}}
    });
  },50);
}

    </tr></thead><tbody>${tRows}</tbody></table></div>`;

function renderPromoSum(){
  const el=document.getElementById("view-promosum");

  const ytd=ALL_ROWS.filter(r=>(n(r["Applications Started"])>0||n(r["Gross Orders"])>0||n(r["Deliveries"])>0)&&isMature(r["Start Date"]));

  const mins={},maxs={};cols.forEach(c=>{const v=data.map(d=>d[c]);mins[c]=Math.min(...v);maxs[c]=Math.max(...v);});

    const prev=i>0?data[i-1]:null;
    const ffDelta=prev?deltaHtml(p.ffRate,prev.ffRate):"";
    return`<tr>
      <td class="left" title="${p.name}" style="max-width:200px;overflow:hidden;text-overflow:ellipsis">${p.name.length>38?p.name.slice(0,36)+"…":p.name}</td>
      <td class="left">${promoStatusBadge(p.start,p.end)}</td>
      <td>${p.days}d</td><td>${p.skus}</td>
      ${heatCell(p.apd,mins.apd,maxs.apd,fmt(p.apd))}
      ${heatCell(p.opd,mins.opd,maxs.opd,fmt(p.opd))}
      ${heatCell(p.aoRate,mins.aoRate,maxs.aoRate,fmt(p.aoRate)+"%")}
      <td style="text-align:right">${heatColor(p.ffRate,mins.ffRate,maxs.ffRate)?`<span style="${heatColor(p.ffRate,mins.ffRate,maxs.ffRate)};padding:2px 6px;border-radius:3px;font-size:12px">${fmt(p.ffRate)}%</span>`:fmt(p.ffRate)+"%"} ${ffDelta}</td>
    </tr>`;
  }).join("");
  el.innerHTML=`<p style="font-size:12px;color:var(--text2);margin-bottom:12px">Sorted chronologically. Arrows show promo-over-promo change in full funnel rate.</p>`+
  heatKey()+`<div class="tbl-scroll"><table>
    <thead><tr><th class="left" style="min-width:180px">Promotion</th><th class="left">Status</th><th>Days</th><th>SKUs</th>
    <th>Avg apps/day</th><th>Avg orders/day</th><th>App→order %</th><th>Full funnel %</th>
    </tr></thead><tbody>${rows}</tbody></table></div>`;
}

/* ═══════════════════════════════════════════
   AI INSIGHTS
═══════════════════════════════════════════ */
async function runInsights(){
  const btn=document.getElementById("insights-btn");
  const out=document.getElementById("insights-output");
  const content=document.getElementById("insights-content");
  btn.disabled=true;
  btn.innerHTML='<span style="display:inline-block;width:12px;height:12px;border:2px solid var(--border-med);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite"></span> Analyzing…';
  out.style.display="block";
  content.innerHTML='<span style="color:var(--text3)">Generating executive insights…</span>';

  // Build summary data for Claude — mature completed promos only
  const ytd=ALL_ROWS.filter(r=>isMature(r["Start Date"])&&(n(r["Applications Started"])>0||n(r["Deliveries"])>0));
  const promoMap={};
  ytd.forEach(r=>{
    const p=r["Promotion"];
    if(!promoMap[p]) promoMap[p]={name:p,start:r["Start Date"],end:r["End Date"],apps:0,orders:0,del:0,days:n(r["Number of Promo Days"]),skus:0,cats:{}};
    promoMap[p].apps+=n(r["Applications Started"]);promoMap[p].orders+=n(r["Gross Orders"]);promoMap[p].del+=n(r["Deliveries"]);promoMap[p].skus++;
    const cat=r["Category"]||"Other";
    if(!promoMap[p].cats[cat]) promoMap[p].cats[cat]={apps:0,del:0};
    promoMap[p].cats[cat].apps+=n(r["Applications Started"]);promoMap[p].cats[cat].del+=n(r["Deliveries"]);
  });

  const promos=Object.values(promoMap).sort((a,b)=>parseDate(a.start)-parseDate(b.start));
  const promoSummary=promos.map(p=>{
    const ff=p.apps>0?(p.del/p.apps*100).toFixed(1):"0";
    const ao=p.apps>0?(p.orders/p.apps*100).toFixed(1):"0";
    const apd=p.days>0?(p.apps/p.days).toFixed(0):"0";
    return `${p.name} | ${p.start} | Days:${p.days} | SKUs:${p.skus} | Apps:${p.apps} | Apps/day:${apd} | Orders:${p.orders} | App→Order:${ao}% | Deliveries:${p.del} | FullFunnel:${ff}%`;
  }).join("\n");

  // Category rollup
  const catMap={};
  ytd.forEach(r=>{
    const c=r["Sub-Category"]||r["Category"]||"Other";
    if(!catMap[c]) catMap[c]={apps:0,orders:0,del:0};
    catMap[c].apps+=n(r["Applications Started"]);catMap[c].orders+=n(r["Gross Orders"]);catMap[c].del+=n(r["Deliveries"]);
  });
  const catSummary=Object.entries(catMap).sort((a,b)=>b[1].del-a[1].del).slice(0,10)
    .map(([c,v])=>`${c}: Apps=${v.apps} Orders=${v.orders} Del=${v.del} FF=${v.apps>0?(v.del/v.apps*100).toFixed(1):"0"}%`).join("\n");

  // Trend: is performance improving?
  const completedSorted=promos.filter(p=>promoStatus(p.start,p.end).status==="complete"&&p.apps>0);
  const trendLines=completedSorted.map(p=>`${p.name.slice(0,30)}: FF=${p.apps>0?(p.del/p.apps*100).toFixed(1):"0"}% AO=${p.apps>0?(p.orders/p.apps*100).toFixed(1):"0"}%`).join("\n");

  const totApps=ytd.reduce((s,r)=>s+n(r["Applications Started"]),0);
  const totOrders=ytd.reduce((s,r)=>s+n(r["Gross Orders"]),0);
  const totDel=ytd.reduce((s,r)=>s+n(r["Deliveries"]),0);

  const prompt=`You are a senior ecommerce analyst preparing a briefing for executives. Analyze the following YTD promotion performance data and generate 7-10 concise, specific, actionable insights that would be most valuable for executive decision-making. Focus on: trends over time, standout promotions (best and worst), category patterns, conversion funnel issues, and recommendations. Be specific — use the actual numbers. Format each insight as a short bold headline followed by 1-2 sentences of explanation. Do not use markdown formatting or bullet symbols — just number each insight 1 through N.

YTD TOTALS (mature promos only, excludes promos started <14 days ago):
Total Applications: ${totApps.toLocaleString()}
Total Orders: ${totOrders.toLocaleString()}  
Total Deliveries: ${totDel.toLocaleString()}
Overall Full Funnel Rate: ${totApps>0?(totDel/totApps*100).toFixed(1):"0"}%
Overall App-to-Order Rate: ${totApps>0?(totOrders/totApps*100).toFixed(1):"0"}%

PROMOTION PERFORMANCE (chronological):
${promoSummary}

TOP CATEGORIES BY DELIVERIES:
${catSummary}

FULL FUNNEL TREND (completed promos in order):
${trendLines}`;

  try {
    const apiKey=document.getElementById("insights-api-key").value.trim();
    if(!apiKey){
      content.innerHTML='<span style="color:var(--amber)">Please enter your Anthropic API key above to generate insights.</span>';
      btn.disabled=false;btn.innerHTML="✦ Generate insights";
      return;
    }
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key":apiKey,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true"
      },
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1500,messages:[{role:"user",content:prompt}]})
    });
    const data=await res.json();
    const text=data.content?.map(b=>b.text||"").join("\n")||"No response.";

    // Format numbered insights into cards
    const insights=text.split(/\n(?=\d+\.)/).filter(s=>s.trim());
    const cards=insights.map(insight=>{
      const boldMatch=insight.match(/^\d+\.\s*([^\n.]+)[.\n]([\s\S]*)/);
      if(boldMatch){
        return`<div style="padding:10px 0;border-bottom:1px solid var(--border)"><span style="font-weight:500;color:var(--text)">${boldMatch[1].trim()}</span> <span style="color:var(--text2)">${boldMatch[2].trim()}</span></div>`;
      }
      return`<div style="padding:10px 0;border-bottom:1px solid var(--border)">${insight.trim()}</div>`;
    }).join("");

    content.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><span style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace">${insights.length} INSIGHTS · Based on ${completedSorted.length} completed promotions</span><button onclick="runInsights()" style="font-size:11px;color:var(--accent);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif">↺ Regenerate</button></div>${cards||text}`;
  } catch(e){
    content.innerHTML=`<span style="color:var(--red)">Request failed: ${e.message}. Check your API key and try again.</span>`;
  }
  btn.disabled=false;
  btn.innerHTML="✦ Generate insights";
}

/* ─── Art Type Breakdown (called from renderAssetsTab) ─── */
function buildArtTypeBreakdown(assetRows, selIdx) {
  const ART_COLORS = {
    "Promotional":    "#2a5caa",
    "Product-focused":"#1a7a52",
    "Generic":        "#8a5c00",
    "Category-focused":"#6b3fa0",
    "Brand-focused":  "#c0392b",
    "Other":          "#a8a7a3",
  };

  // Normalize CTR
  function normCtr(v){ return (v!==null&&v!==undefined)?(v<1?v*100:v):null; }

  // Rollup: per art type
  const artMap = {};
  assetRows.forEach(a => {
    a.data.forEach(d => {
      const at = d.art_type || "Unknown";
      const ctr = normCtr(d.ctr);
      if (ctr === null) return;
      if (!artMap[at]) artMap[at] = { ctrs: [], clicks: 0, count: 0 };
      artMap[at].ctrs.push(ctr);
      artMap[at].clicks += (d.clicks || 0);
      artMap[at].count++;
    });
  });

  const artTypes = Object.entries(artMap)
    .map(([type, v]) => ({
      type,
      avgCtr: v.ctrs.reduce((s,x)=>s+x,0)/v.ctrs.length,
      totalClicks: v.clicks,
      count: v.count,
      color: ART_COLORS[type] || "#a8a7a3"
    }))
    .sort((a,b) => b.avgCtr - a.avgCtr);

  // Per-placement per-art-type matrix
  const placementMatrix = assetRows.map(a => {
    const byType = {};
    a.data.forEach(d => {
      const at = d.art_type || "Unknown";
      const ctr = normCtr(d.ctr);
      if (ctr === null) return;
      if (!byType[at]) byType[at] = [];
      byType[at].push(ctr);
    });
    const entries = Object.entries(byType).map(([type, ctrs]) => ({
      type,
      avg: ctrs.reduce((s,x)=>s+x,0)/ctrs.length,
      n: ctrs.length,
      color: ART_COLORS[type] || "#a8a7a3"
    })).sort((a,b) => b.avg - a.avg);
    return { name: a.name, entries };
  });

  const maxCtr = Math.max(...artTypes.map(a => a.avgCtr));

  // Overall summary cards
  const summaryCards = artTypes.map(a => {
    const barW = maxCtr > 0 ? Math.round(a.avgCtr / maxCtr * 100) : 0;
    return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;flex-direction:column;gap:4px">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:12px;font-weight:500;color:${a.color}">${a.type}</span>
        <span style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace">${a.count} data pts</span>
      </div>
      <div style="font-size:22px;font-weight:500;letter-spacing:-0.02em">${a.avgCtr.toFixed(1)}% <span style="font-size:12px;font-weight:400;color:var(--text2)">avg CTR</span></div>
      <div class="bar-bg"><div class="bar-fill" style="width:${barW}%;background:${a.color}"></div></div>
      <div style="font-size:11px;color:var(--text2)">${a.totalClicks.toLocaleString()} total clicks</div>
    </div>`;
  }).join('');

  // Per-placement breakdown table
  const allArtTypes = [...new Set(assetRows.flatMap(a => a.data.map(d => d.art_type||"Unknown").filter(Boolean)))].sort((a,b)=>{
    const order=["Promotional","Product-focused","Generic","Category-focused","Brand-focused","Other"];
    return (order.indexOf(a)||99)-(order.indexOf(b)||99);
  });

  const tableHeaders = allArtTypes.map(at =>
    `<th style="text-align:center;min-width:80px"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${ART_COLORS[at]||'#aaa'};margin-right:4px"></span>${at}</th>`
  ).join('');

  const tableRows = placementMatrix.map(placement => {
    const cells = allArtTypes.map(at => {
      const entry = placement.entries.find(e => e.type === at);
      if (!entry) return `<td style="text-align:center;color:var(--text3)">—</td>`;
      // Find min/max for this art type across all placements for normalization
      const allVals = placementMatrix.map(p => { const e=p.entries.find(x=>x.type===at); return e?e.avg:null; }).filter(v=>v!==null);
      const minV = Math.min(...allVals), maxV = Math.max(...allVals);
      const style = maxV>minV ? `${heatColorStr(entry.avg,minV,maxV)};` : '';
      return `<td style="text-align:center;${style}padding:7px 5px;font-weight:500">${entry.avg.toFixed(1)}%<div style="font-size:9px;opacity:0.8">n=${entry.n}</div></td>`;
    }).join('');
    return `<tr><td class="left" style="font-weight:500;font-size:12px;white-space:nowrap">${placement.name}</td>${cells}</tr>`;
  }).join('');

  // Only show placement breakdown table in YTD view (no promo selected)
  const placementTable=selIdx<0?`<p style="font-size:12px;font-weight:500;margin-bottom:8px">CTR by placement &amp; art type</p>
    ${heatKey()}
    <div class="tbl-scroll">
      <table>
        <thead><tr><th class="left" style="min-width:160px">Placement</th>${tableHeaders}</tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>`:'';

  return `
    <hr class="section-divider">
    <p style="font-size:12px;font-weight:500;margin-bottom:12px">Art type performance</p>
    <p style="font-size:12px;color:var(--text2);margin-bottom:14px">Average CTR by creative approach across all placements and promotions YTD.</p>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:1.5rem">
      ${summaryCards}
    </div>
    ${placementTable}`;
}

function heatColorStr(val, min, max) {
  if (max === min) return "background:transparent";
  const t = (val - min) / (max - min);
  let r, g, b;
  if (t > 0.5) { const s=(t-0.5)*2; r=Math.round(138+(26-138)*s); g=Math.round(96+(122-96)*s); b=Math.round(0+(82-0)*s); }
  else { const s=t*2; r=Math.round(184+(138-184)*s); g=Math.round(48+(96-48)*s); b=Math.round(48+(0-48)*s); }
  const lum = 0.299*r + 0.587*g + 0.114*b;
  return `background:rgb(${r},${g},${b});color:${lum>140?"#1a1916":"#fff"}`;
}

init();
</script>
