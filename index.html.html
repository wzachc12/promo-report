<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promo Performance Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --bg:#f7f6f3;--surface:#fff;--surface2:#f2f1ed;
  --border:rgba(0,0,0,0.09);--border-med:rgba(0,0,0,0.16);
  --text:#1a1916;--text2:#6b6a66;--text3:#a8a7a3;
  --accent:#2a5caa;--accent-bg:#edf2fb;
  --green:#1a7a52;--green-bg:#e8f5ee;
  --red:#b83030;--red-bg:#fbeaea;
  --amber:#8a5c00;--amber-bg:#fef3e2;
  --radius:10px;--radius-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
.logo{font-size:15px;font-weight:500;letter-spacing:-0.01em;display:flex;align-items:center;gap:8px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.header-meta{font-size:11px;color:var(--text3);font-family:"DM Mono",monospace}
.main{max-width:1160px;margin:0 auto;padding:1.5rem 1.5rem}
.filters-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:1.25rem}
.filter-group{display:flex;flex-direction:column;gap:5px}
.filter-label{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-family:"DM Mono",monospace}
select{width:100%;padding:7px 10px;font-size:13px;font-family:"DM Sans",sans-serif;border:1px solid var(--border-med);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);cursor:pointer;outline:none}
select:focus{border-color:var(--accent)}
.tab-bar{display:flex;border-bottom:1px solid var(--border);margin-bottom:1.25rem;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{height:0}
.tab{padding:9px 16px;cursor:pointer;font-size:13px;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .12s;white-space:nowrap;flex-shrink:0}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text);font-weight:500;border-bottom-color:var(--text)}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1.25rem}
.tbl-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead th{text-align:right;padding:8px 7px;font-weight:500;font-size:11px;color:var(--text3);border-bottom:1px solid var(--border);white-space:nowrap;font-family:"DM Mono",monospace;letter-spacing:.03em;background:var(--surface)}
thead th.left,td.left{text-align:left}
td{padding:8px 7px;border-bottom:1px solid var(--border);text-align:right;white-space:nowrap}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--surface2)}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500;font-family:"DM Mono",monospace;vertical-align:middle}
.badge-elec{background:var(--accent-bg);color:var(--accent)}
.badge-appl{background:var(--green-bg);color:var(--green)}
.badge-furn{background:#f0eefe;color:#4a3faa}
.badge-lawn{background:#eaf5e0;color:#2e6b1a}
.badge-other{background:var(--surface2);color:var(--text2)}
.status-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500;white-space:nowrap}
.status-live{background:#e8f5ee;color:#1a7a52}
.status-live::before{content:"";display:inline-block;width:6px;height:6px;border-radius:50%;background:#1a7a52;animation:pulse 1.5s infinite}
.status-complete{background:var(--surface2);color:var(--text2)}
.status-upcoming{background:var(--amber-bg);color:var(--amber)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.mono{font-family:"DM Mono",monospace}
.no-data{text-align:center;padding:3rem;color:var(--text3);font-size:13px}
.heatmap-key{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);margin-bottom:12px}
.hk-bar{display:flex;height:8px;width:100px;border-radius:4px;overflow:hidden}
.hk-seg{flex:1}
.data-note{font-size:11px;color:var(--text3);padding:8px 0 0;text-align:right}
.delta-up{color:var(--green);font-size:11px}
.delta-down{color:var(--red);font-size:11px}
.delta-flat{color:var(--text3);font-size:11px}
.bar-bg{background:var(--border);border-radius:2px;height:3px;margin-top:3px}
.bar-fill{background:var(--accent);border-radius:2px;height:3px}

/* ── Executive Summary ── */
.ytd-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
.ytd-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.ytd-label{font-size:11px;color:var(--text3);font-family:"DM Mono",monospace;margin-bottom:4px}
.ytd-val{font-size:26px;font-weight:500;letter-spacing:-0.02em;line-height:1}
.ytd-sub{font-size:11px;color:var(--text2);margin-top:3px}
.exec-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:1.5rem}
.exec-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem}
.exec-card-title{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-family:"DM Mono",monospace;margin-bottom:10px}
.promo-timeline{display:flex;flex-direction:column;gap:6px}
.tl-row{display:flex;align-items:center;gap:10px;font-size:12px}
.tl-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.tl-bar-wrap{width:120px;flex-shrink:0}
.tl-bar-track{background:var(--surface2);border-radius:2px;height:6px;position:relative;overflow:hidden}
.tl-bar-prog{height:6px;border-radius:2px;background:var(--accent)}
.tl-pct{font-size:11px;color:var(--text2);width:38px;text-align:right;flex-shrink:0;font-family:"DM Mono",monospace}
.top-bottom{display:flex;flex-direction:column;gap:6px}
.tb-row{display:flex;align-items:baseline;justify-content:space-between;gap:8px;font-size:12px;padding:6px 0;border-bottom:1px solid var(--border)}
.tb-row:last-child{border-bottom:none}
.tb-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;color:var(--text)}
.tb-val{font-family:"DM Mono",monospace;font-size:12px;font-weight:500;flex-shrink:0}
.trend-chart-wrap{position:relative;height:180px;width:100%}
.section-title{font-size:13px;font-weight:500;margin-bottom:12px}
.pill{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-family:"DM Mono",monospace;padding:2px 6px;border-radius:3px;font-weight:500}
.pill-up{background:#e8f5ee;color:#1a7a52}
.pill-down{background:#fbeaea;color:#b83030}
.pill-flat{background:var(--surface2);color:var(--text2)}

/* ── Asset tab ── */
.asset-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-bottom:1.5rem}
.asset-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.1rem}
.asset-card-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:2px}
.asset-card-name{font-size:13px;font-weight:500}
.asset-card-ctr{font-size:22px;font-weight:500;letter-spacing:-0.02em;line-height:1.1;margin-bottom:2px}
.asset-card-sub{font-size:11px;color:var(--text2);margin-bottom:10px}
.sparkline-wrap{position:relative;height:52px}
.section-divider{border:none;border-top:1px solid var(--border);margin:1.5rem 0}
.hm-table{font-size:11.5px;min-width:600px}
.hm-table th{font-size:10px;padding:6px 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px}
.hm-table td{padding:6px 5px;font-size:11px;font-family:"DM Mono",monospace;font-weight:500}

@media(max-width:700px){.ytd-strip{grid-template-columns:repeat(2,1fr)}.exec-grid{grid-template-columns:1fr}.filters-bar{grid-template-columns:1fr}.main{padding:1rem}}
</style>
</head>

</div>

function n(v){return parseFloat(v)||0}
function pct(v){return parseFloat((v||"").replace("%",""))||0}
function fmt(v,d=1){return(v===null||v===undefined||isNaN(v))?"—":Number(v).toFixed(d)}
function fmtN(v){return n(v).toLocaleString()}
function parseDate(s){if(!s)return null;const[m,d,y]=s.split("/");return new Date(+y,+m-1,+d)}

function promoStatus(startStr,endStr){
  const s=parseDate(startStr),e=parseDate(endStr);
  if(!s||!e)return{status:"unknown",label:"Unknown",daysLeft:null};
  const t=new Date(TODAY);t.setHours(0,0,0,0);
  const end=new Date(e);end.setHours(23,59,59,999);
  if(t<s){
    const diff=Math.round((s-t)/(1000*60*60*24));
    return{status:"upcoming",label:`In ${diff}d`,daysLeft:diff};
  }
  if(t<=end){
    const diff=Math.round((end-t)/(1000*60*60*24));
    return{status:"live",label:`${diff}d left`,daysLeft:diff};
  }
  return{status:"complete",label:"Complete",daysLeft:null};
}

function promoStatusBadge(startStr,endStr){
  const{status,label}=promoStatus(startStr,endStr);
  if(status==="live") return`<span class="status-badge status-live">Live · ${label}</span>`;
  if(status==="upcoming") return`<span class="status-badge status-upcoming">Upcoming · ${label}</span>`;
  return`<span class="status-badge status-complete">Complete</span>`;
}

/* ── Heatmap helpers ── */
function heatColor(val,min,max){
  if(max===min||val===null)return"background:transparent";
  const t=(val-min)/(max-min);
  let r,g,b;
  if(t>0.5){const s=(t-0.5)*2;r=Math.round(138+(26-138)*s);g=Math.round(96+(122-96)*s);b=Math.round(0+(82-0)*s);}
  else{const s=t*2;r=Math.round(184+(138-184)*s);g=Math.round(48+(96-48)*s);b=Math.round(48+(0-48)*s);}
  const lum=0.299*r+0.587*g+0.114*b;
  return`background:rgb(${r},${g},${b});color:${lum>140?"#1a1916":"#fff"}`;
}
function heatCell(val,min,max,display){
  return`<td style="text-align:right;${heatColor(val,min,max)};padding:8px 7px;font-weight:500">${display}</td>`;
}
function heatKey(){
  return`<div class="heatmap-key"><span style="color:var(--red)">Low</span><div class="hk-bar">
    <div class="hk-seg" style="background:rgb(184,48,48)"></div><div class="hk-seg" style="background:rgb(161,72,24)"></div>
    <div class="hk-seg" style="background:rgb(138,96,0)"></div><div class="hk-seg" style="background:rgb(82,109,41)"></div>
    <div class="hk-seg" style="background:rgb(26,122,82)"></div>
  </div><span style="color:var(--green)">High</span><span style="margin-left:12px;color:var(--text3)">Colour is relative within each column</span></div>`;
}

function deltaHtml(curr,prev,suffix="%"){
  if(!prev||prev===0)return"";
  const d=((curr-prev)/prev*100);
  const cls=d>0?"delta-up":d<0?"delta-down":"delta-flat";
  const arrow=d>0?"↑":d<0?"↓":"→";
  return`<span class="${cls}">${arrow}${Math.abs(d).toFixed(1)}%</span>`;
}

/* ── Rollup helpers ── */
function rollupByPromo(rows){
  const map={};
  rows.forEach(r=>{
    const k=r["Promotion"];
    if(!map[k])map[k]={name:k,apps:0,orders:0,del:0,days:n(r["Number of Promo Days"]),start:r["Start Date"],end:r["End Date"],skus:0};
    map[k].apps+=n(r["Applications Started"]);map[k].orders+=n(r["Gross Orders"]);map[k].del+=n(r["Deliveries"]);map[k].skus++;
  });
  return Object.values(map).map(p=>({...p,
    apd:p.days>0?p.apps/p.days:0,opd:p.days>0?p.orders/p.days:0,
    aoRate:p.apps>0?p.orders/p.apps*100:0,
    odRate:p.orders>0?p.del/p.orders*100:0,
    ffRate:p.apps>0?p.del/p.apps*100:0,
  })).sort((a,b)=>parseDate(a.start)-parseDate(b.start));
}

function catBadge(cat){
  const c=(cat||"").toLowerCase();let cls="badge-other";
  if(c.includes("elect"))cls="badge-elec";else if(c.includes("appl"))cls="badge-appl";
  else if(c.includes("furn"))cls="badge-furn";else if(c.includes("lawn"))cls="badge-lawn";
  return`<span class="badge ${cls}">${cat}</span>`;
}

    return n.length>20?n.slice(0,18)+"…":n;

  // Promo-over-promo delta for last completed

    const last=completedPromos[completedPromos.length-1];
    const prev=completedPromos[completedPromos.length-2];
    const ffD=last.ffRate-prev.ffRate;
    const aoD=last.aoRate-prev.aoRate;
    const cls=ffD>=0?"delta-up":"delta-down";
    const arrow=ffD>=0?"↑":"↓";

  }

  // Status rows for all promos
  const allPromoMeta={};
  ALL_ROWS.forEach(r=>{const p=r["Promotion"];if(!allPromoMeta[p])allPromoMeta[p]={start:r["Start Date"],end:r["End Date"]};});
  const allPromos=Object.entries(allPromoMeta).sort((a,b)=>parseDate(a[1].start)-parseDate(b[1].start));
  const statusRows=allPromos.map(([name,{start,end}])=>{
    const{status,label}=promoStatus(start,end);
    const pd=promoData.find(p=>p.name===name);
    const ff=pd?`${fmt(pd.ffRate)}%`:"—";
    const badge=status==="live"?`<span class="status-badge status-live">Live · ${label}</span>`:

      <td>${ff}</td>
    </tr>`;
  }).join("");

  el.innerHTML=`
    <!-- YTD Strip -->
    <div class="ytd-strip">
      <div class="ytd-card">
        <div class="ytd-label">YTD Applications</div>

      </div>
      <div class="ytd-card">
        <div class="ytd-label">YTD Full Funnel Rate</div>
        <div class="ytd-val">${fmt(ytdFF)}%</div>
        <div class="ytd-sub">Deliveries / Applications</div>
      </div>
    </div>

    <!-- Trend chart + top/bottom -->
    <div class="exec-grid">
      <div class="exec-card" style="grid-column:1/-1">
        <div class="exec-card-title">Full funnel rate &amp; App→order rate — promo over promo</div>
        ${momHtml}
        <div class="trend-chart-wrap" style="height:200px;margin-top:12px">
          <canvas id="trend-chart" role="img" aria-label="Trend line of full funnel and app to order rates across completed promotions"></canvas>
        </div>
      </div>

      <div class="exec-card">
        <div class="exec-card-title">Top 3 promotions — full funnel rate</div>
        <div class="top-bottom">
          ${top3.map((p,i)=>`<div class="tb-row">
            <div style="display:flex;flex-direction:column;min-width:0;flex:1;gap:2px">
              <div class="tb-name">${p.name.length>40?p.name.slice(0,38)+"…":p.name}</div>
              <div style="display:flex;gap:8px;font-size:11px;color:var(--text2)"><span>${fmtN(p.apps)} apps</span><span>${fmtN(p.del)} del</span></div>

              <div style="display:flex;gap:8px;font-size:11px;color:var(--text2)"><span>${fmtN(p.apps)} apps</span><span>${fmtN(p.del)} del</span></div>
            </div>
            <div class="tb-val" style="color:var(--red)">${fmt(p.ffRate)}%</div>

    <!-- Promotion status table -->

      <table>

          <th>Progress</th>
          <th>Full funnel</th>
        </tr></thead>
        <tbody>${statusRows}</tbody>

  // Render trend chart
  setTimeout(()=>{

      sparkCharts.push(sc);
    });
    const lc=new Chart(document.getElementById("line-chart"),{type:"line",data:{labels:shortLabels,datasets:lineDatasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{mode:"index",intersect:false,callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y!==null?c.parsed.y.toFixed(2)+"%":"—"}`}}},scales:{x:{ticks:{font:{size:10,family:"DM Sans,sans-serif"},maxRotation:40,autoSkip:false}},y:{ticks:{callback:v=>v+"%"},title:{display:true,text:"CTR %",font:{size:11}}}}}});
    sparkCharts.push(lc);
  },50);
}

/* ═══════════════════════════════════════════
   TAB 3: PROMO VS PROMO
═══════════════════════════════════════════ */
function renderPromoView(){
  const el=document.getElementById("view-promo");
  const data=rollupByPromo(filtered);
  if(!data.length){el.innerHTML='<div class="no-data">No data for current filters.</div>';return;}
  const ffV=data.map(p=>p.ffRate),aoV=data.map(p=>p.aoRate),odV=data.map(p=>p.odRate);
  const maxFF=Math.max(...ffV),minFF=Math.min(...ffV),maxAO=Math.max(...aoV),minAO=Math.min(...aoV),maxOD=Math.max(...odV),minOD=Math.min(...odV);

  const rows=data.map((p,i)=>{
    const prev=i>0?data[i-1]:null;
    const ffDelta=prev?deltaHtml(p.ffRate,prev.ffRate):"";
    const aoDelta=prev?deltaHtml(p.aoRate,prev.aoRate):"";
    const barW=maxFF>0?Math.round(p.ffRate/maxFF*100):0;
    const name=p.name.length>38?p.name.slice(0,36)+"…":p.name;
    const{status}=promoStatus(p.start,p.end);
    const statusDot=status==="live"?`<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:5px;vertical-align:middle"></span>`:
      status==="upcoming"?`<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--amber);margin-right:5px;vertical-align:middle"></span>`:"";
    return`<tr>
      <td class="left" title="${p.name}" style="max-width:220px;overflow:hidden;text-overflow:ellipsis">${statusDot}${name}</td>
      <td class="left">${promoStatusBadge(p.start,p.end)}</td>
      <td class="mono">${p.days}d</td><td>${p.skus}</td>
      <td>${p.apps.toLocaleString()}</td><td>${fmt(p.apd)}</td>
      <td>${p.orders.toLocaleString()}</td>
      <td>${heatColor(aoV[i],minAO,maxAO)?`<span style="${heatColor(aoV[i],minAO,maxAO)};padding:2px 6px;border-radius:3px;font-size:12px">${fmt(aoV[i])}%</span>`:fmt(aoV[i])+"%"} ${aoDelta}</td>
      <td>${p.del.toLocaleString()}</td>
      <td>${heatColor(odV[i],minOD,maxOD)?`<span style="${heatColor(odV[i],minOD,maxOD)};padding:2px 6px;border-radius:3px;font-size:12px">${fmt(odV[i])}%</span>`:fmt(odV[i])+"%"}</td>
      <td><div style="display:flex;align-items:center;gap:6px"><span style="font-family:'DM Mono',monospace">${fmt(p.ffRate)}%</span>${ffDelta}</div><div class="bar-bg"><div class="bar-fill" style="width:${barW}%"></div></div></td>
    </tr>`;
  }).join("");

  el.innerHTML=`
    <p style="font-size:12px;color:var(--text2);margin-bottom:10px">Sorted chronologically. Arrows show change vs prior promotion.</p>
    <div style="display:flex;flex-wrap:wrap;gap:14px;margin-bottom:10px;font-size:12px;color:var(--text2)">
      <span style="display:flex;align-items:center;gap:5px"><span style="width:9px;height:9px;border-radius:2px;background:#2a5caa;display:inline-block"></span>Full funnel %</span>
      <span style="display:flex;align-items:center;gap:5px"><span style="width:9px;height:9px;border-radius:2px;background:#1a7a52;display:inline-block"></span>App→order %</span>
      <span style="display:flex;align-items:center;gap:5px"><span style="width:9px;height:9px;border-radius:2px;background:#c0392b;display:inline-block"></span>Order→del %</span>
    </div>
    <div style="position:relative;width:100%;height:${Math.max(200,data.length*40+60)}px;margin-bottom:1.5rem">
      <canvas id="promo-chart"></canvas>
    </div>
    <div class="tbl-scroll"><table>
      <thead><tr>
        <th class="left" style="min-width:180px">Promotion</th><th class="left">Status</th>
        <th>Days</th><th>SKUs</th><th>Apps</th><th>Apps/day</th>
        <th>Orders</th><th>App→order</th><th>Deliveries</th><th>Order→del</th><th>Full funnel</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;

  setTimeout(()=>{
    if(chartInst){chartInst.destroy();chartInst=null;}
    chartInst=new Chart(document.getElementById("promo-chart"),{
      type:"bar",
      data:{labels:data.map(p=>p.name.length>28?p.name.slice(0,26)+"…":p.name),datasets:[
        {label:"Full funnel %",data:ffV,backgroundColor:"#2a5caa"},
        {label:"App→order %",data:aoV,backgroundColor:"#1a7a52"},
        {label:"Order→del %",data:odV,backgroundColor:"#c0392b"},
      ]},
      options:{indexAxis:"y",responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.x.toFixed(1)}%`}}},scales:{x:{ticks:{callback:v=>v+"%"},max:100},y:{ticks:{font:{size:10,family:"DM Sans,sans-serif"},autoSkip:false}}}}
    });
  },50);
}

/* ═══════════════════════════════════════════
   TAB 4: SKUs IN PROMOTION
═══════════════════════════════════════════ */
function renderSKUView(){
  const el=document.getElementById("view-sku");
  const fPromo=document.getElementById("f-promo").value;
  if(!fPromo){el.innerHTML='<div class="no-data">Select a specific promotion from the filter above to see SKU-level detail.</div>';return;}
  const rows=[...filtered].sort((a,b)=>n(b["Applications Started"])-n(a["Applications Started"]));
  if(!rows.length){el.innerHTML='<div class="no-data">No SKUs with data for this promotion.</div>';return;}
  const ffV=rows.map(r=>pct(r["Full Funnel Completion Rate"]));
  const aoV=rows.map(r=>pct(r["App-To-Order Conversion Rate"]));
  const maxFF=Math.max(...ffV),minFF=Math.min(...ffV),maxAO=Math.max(...aoV),minAO=Math.min(...aoV);
  const tRows=rows.map((r,i)=>`<tr>
    <td class="left mono" style="font-size:12px">${r["SKU"]}</td>
    <td class="left">${catBadge(r["Category"])}</td>
    <td class="left" style="color:var(--text2);font-size:12px">${r["Sub-Category"]||"—"}</td>
    <td>${fmtN(r["Applications Started"])}</td><td>${r["Applications per Promo Day"]||"—"}</td>
    <td>${fmtN(r["Gross Orders"])}</td>
    ${heatCell(aoV[i],minAO,maxAO,r["App-To-Order Conversion Rate"]||"—")}
    <td>${fmtN(r["Deliveries"])}</td><td>${r["Order-to-Delivery Conversion Rate"]||"—"}</td>
    ${heatCell(ffV[i],minFF,maxFF,r["Full Funnel Completion Rate"]||"—")}
  </tr>`).join("");
  el.innerHTML=heatKey()+`<div class="tbl-scroll"><table>
    <thead><tr><th class="left">SKU</th><th class="left">Category</th><th class="left">Sub-cat</th>
    <th>Apps</th><th>Apps/day</th><th>Orders</th><th>App→order</th><th>Deliveries</th><th>Order→del</th><th>Full funnel</th>
    </tr></thead><tbody>${tRows}</tbody></table></div>`;
}

/* ═══════════════════════════════════════════
   TAB 5: TRACK SKU
═══════════════════════════════════════════ */
function renderTrackView(){
  const el=document.getElementById("view-track");
  const skuMap={};
  ALL_ROWS.forEach(r=>{if(!r["SKU"])return;if(!skuMap[r["SKU"]])skuMap[r["SKU"]]=[];skuMap[r["SKU"]].push(r);});
  const skusMulti=Object.entries(skuMap).filter(([,v])=>v.length>1).map(([k])=>k).sort();
  el.innerHTML=`<div style="max-width:260px;margin-bottom:1.25rem"><div class="filter-label" style="margin-bottom:5px">Select SKU</div>
    <select id="track-sku" onchange="renderTrackDetail()" style="width:100%">
      <option value="">Choose a SKU…</option>${skusMulti.map(s=>`<option value="${s}">${s}</option>`).join("")}
    </select></div><div id="track-detail"></div>`;
}
function renderTrackDetail(){
  const sku=document.getElementById("track-sku").value;
  const el=document.getElementById("track-detail");
  if(!sku){el.innerHTML="";return;}
  const rows=ALL_ROWS.filter(r=>r["SKU"]===sku&&(n(r["Applications Started"])>0||n(r["Gross Orders"])>0))
    .sort((a,b)=>parseDate(a["Start Date"])-parseDate(b["Start Date"]));
  if(!rows.length){el.innerHTML='<div class="no-data">No data found for this SKU.</div>';return;}
  const ffV=rows.map(r=>pct(r["Full Funnel Completion Rate"]));
  const maxFF=Math.max(...ffV),minFF=Math.min(...ffV);
  const tRows=rows.map((r,i)=>{
    const prev=i>0?rows[i-1]:null;
    const ffDelta=prev?deltaHtml(ffV[i],pct(prev["Full Funnel Completion Rate"])):"";
    const name=r["Promotion"].length>38?r["Promotion"].slice(0,36)+"…":r["Promotion"];
    return`<tr>
      <td class="left" title="${r["Promotion"]}" style="max-width:220px;overflow:hidden;text-overflow:ellipsis">${name}</td>
      <td class="left">${promoStatusBadge(r["Start Date"],r["End Date"])}</td>
      <td class="left mono" style="font-size:11px">${r["Start Date"]||"—"}</td><td>${n(r["Number of Promo Days"])}d</td>
      <td>${fmtN(r["Applications Started"])}</td><td>${r["Applications per Promo Day"]||"—"}</td>
      <td>${fmtN(r["Gross Orders"])}</td><td>${r["App-To-Order Conversion Rate"]||"—"}</td>
      <td>${fmtN(r["Deliveries"])}</td><td>${r["Order-to-Delivery Conversion Rate"]||"—"}</td>
      <td style="text-align:right">${heatColor(ffV[i],minFF,maxFF)?`<span style="${heatColor(ffV[i],minFF,maxFF)};padding:2px 6px;border-radius:3px;font-size:12px">${r["Full Funnel Completion Rate"]||"—"}</span>`:r["Full Funnel Completion Rate"]||"—"} ${ffDelta}</td>
    </tr>`;
  }).join("");
  el.innerHTML=`<div style="font-size:12px;color:var(--text2);margin-bottom:10px">${rows[0]["Category"]||""}${rows[0]["Sub-Category"]?" / "+rows[0]["Sub-Category"]:""}</div>`+
  heatKey()+`<div class="tbl-scroll"><table>
    <thead><tr><th class="left" style="min-width:200px">Promotion</th><th class="left">Status</th><th class="left">Start</th><th>Days</th>
    <th>Apps</th><th>Apps/day</th><th>Orders</th><th>App→order</th><th>Deliveries</th><th>Order→del</th><th>Full funnel</th>
    </tr></thead><tbody>${tRows}</tbody></table></div>`;
}

/* ═══════════════════════════════════════════
   TAB 6: PROMOTION SUMMARY YTD
═══════════════════════════════════════════ */
function renderPromoSum(){
  const el=document.getElementById("view-promosum");
  const ytd=ALL_ROWS.filter(r=>n(r["Applications Started"])>0||n(r["Gross Orders"])>0||n(r["Deliveries"])>0);
  const data=rollupByPromo(ytd).filter(p=>p.apps>0);
  const cols=["apd","opd","aoRate","ffRate"];
  const mins={},maxs={};cols.forEach(c=>{const v=data.map(d=>d[c]);mins[c]=Math.min(...v);maxs[c]=Math.max(...v);});
  const rows=data.map((p,i)=>{
    const prev=i>0?data[i-1]:null;
    const ffDelta=prev?deltaHtml(p.ffRate,prev.ffRate):"";
    return`<tr>
      <td class="left" title="${p.name}" style="max-width:200px;overflow:hidden;text-overflow:ellipsis">${p.name.length>38?p.name.slice(0,36)+"…":p.name}</td>
      <td class="left">${promoStatusBadge(p.start,p.end)}</td>
      <td>${p.days}d</td><td>${p.skus}</td>
      ${heatCell(p.apd,mins.apd,maxs.apd,fmt(p.apd))}
      ${heatCell(p.opd,mins.opd,maxs.opd,fmt(p.opd))}
      ${heatCell(p.aoRate,mins.aoRate,maxs.aoRate,fmt(p.aoRate)+"%")}
      <td style="text-align:right">${heatColor(p.ffRate,mins.ffRate,maxs.ffRate)?`<span style="${heatColor(p.ffRate,mins.ffRate,maxs.ffRate)};padding:2px 6px;border-radius:3px;font-size:12px">${fmt(p.ffRate)}%</span>`:fmt(p.ffRate)+"%"} ${ffDelta}</td>
    </tr>`;
  }).join("");
  el.innerHTML=`<p style="font-size:12px;color:var(--text2);margin-bottom:12px">Sorted chronologically. Arrows show promo-over-promo change in full funnel rate.</p>`+
  heatKey()+`<div class="tbl-scroll"><table>
    <thead><tr><th class="left" style="min-width:180px">Promotion</th><th class="left">Status</th><th>Days</th><th>SKUs</th>
    <th>Avg apps/day</th><th>Avg orders/day</th><th>App→order %</th><th>Full funnel %</th>
    </tr></thead><tbody>${rows}</tbody></table></div>`;
}

/* ═══════════════════════════════════════════
   TAB 7: CATEGORY SUMMARY YTD
═══════════════════════════════════════════ */
function renderCatSum(){
  const el=document.getElementById("view-catsum");
  const ytd=ALL_ROWS.filter(r=>(n(r["Applications Started"])>0||n(r["Gross Orders"])>0)&&r["Sub-Category"]);
  const map={};
  ytd.forEach(r=>{const k=r["Sub-Category"];const cat=r["Category"]||"Other";if(!map[k])map[k]={sub:k,cat,apps:0,orders:0,del:0,totalDays:0,skuPromos:0};map[k].apps+=n(r["Applications Started"]);map[k].orders+=n(r["Gross Orders"]);map[k].del+=n(r["Deliveries"]);map[k].totalDays+=n(r["Number of Promo Days"]);map[k].skuPromos++;});
  const data=Object.values(map).map(p=>({sub:p.sub,cat:p.cat,apd:p.totalDays>0?p.apps/p.totalDays:0,opd:p.totalDays>0?p.orders/p.totalDays:0,aoRate:p.apps>0?p.orders/p.apps*100:0,ffRate:p.apps>0?p.del/p.apps*100:0,skuPromos:p.skuPromos})).sort((a,b)=>b.ffRate-a.ffRate);
  const cols=["apd","opd","aoRate","ffRate"];const mins={},maxs={};cols.forEach(c=>{const v=data.map(d=>d[c]);mins[c]=Math.min(...v);maxs[c]=Math.max(...v);});
  const rows=data.map(d=>`<tr>
    <td class="left">${catBadge(d.cat)}</td><td class="left">${d.sub}</td><td>${d.skuPromos}</td>
    ${heatCell(d.apd,mins.apd,maxs.apd,fmt(d.apd))}${heatCell(d.opd,mins.opd,maxs.opd,fmt(d.opd))}
    ${heatCell(d.aoRate,mins.aoRate,maxs.aoRate,fmt(d.aoRate)+"%")}${heatCell(d.ffRate,mins.ffRate,maxs.ffRate,fmt(d.ffRate)+"%")}
  </tr>`).join("");
  el.innerHTML=`<p style="font-size:12px;color:var(--text2);margin-bottom:12px">YTD averages per sub-category, sorted by full funnel rate.</p>`+
  heatKey()+`<div class="tbl-scroll"><table>
    <thead><tr><th class="left">Category</th><th class="left">Sub-category</th><th>SKU-promos</th>
    <th>Avg apps/day</th><th>Avg orders/day</th><th>App→order %</th><th>Full funnel %</th>
    </tr></thead><tbody>${rows}</tbody></table></div>`;
}

/* ═══════════════════════════════════════════
   TAB 8: SKU EFFICIENCY RANKING
═══════════════════════════════════════════ */
function renderSKURank(){
  const el=document.getElementById("view-skurank");
  const ytd=ALL_ROWS.filter(r=>n(r["Applications Started"])>0||n(r["Gross Orders"])>0);
  const map={};
  ytd.forEach(r=>{const k=r["SKU"];if(!map[k])map[k]={sku:k,cat:r["Category"]||"",sub:r["Sub-Category"]||"",apps:0,orders:0,del:0,totalDays:0,promos:0};map[k].apps+=n(r["Applications Started"]);map[k].orders+=n(r["Gross Orders"]);map[k].del+=n(r["Deliveries"]);map[k].totalDays+=n(r["Number of Promo Days"]);map[k].promos++;});
  const data=Object.values(map).map(p=>({sku:p.sku,cat:p.cat,sub:p.sub,promos:p.promos,apd:p.totalDays>0?p.apps/p.totalDays:0,opd:p.totalDays>0?p.orders/p.totalDays:0,aoRate:p.apps>0?p.orders/p.apps*100:0,ffRate:p.apps>0?p.del/p.apps*100:0})).sort((a,b)=>b.ffRate-a.ffRate);
  const cols=["apd","opd","aoRate","ffRate"];const mins={},maxs={};cols.forEach(c=>{const v=data.map(d=>d[c]);mins[c]=Math.min(...v);maxs[c]=Math.max(...v);});
  const rows=data.map((d,i)=>`<tr>
    <td style="text-align:right;color:var(--text3);font-size:11px;font-family:'DM Mono',monospace">${i+1}</td>
    <td class="left mono" style="font-size:12px">${d.sku}</td>
    <td class="left">${catBadge(d.cat)}</td>
    <td class="left" style="color:var(--text2);font-size:12px">${d.sub||"—"}</td>
    <td>${d.promos}</td>
    ${heatCell(d.apd,mins.apd,maxs.apd,fmt(d.apd))}${heatCell(d.opd,mins.opd,maxs.opd,fmt(d.opd))}
    ${heatCell(d.aoRate,mins.aoRate,maxs.aoRate,fmt(d.aoRate)+"%")}${heatCell(d.ffRate,mins.ffRate,maxs.ffRate,fmt(d.ffRate)+"%")}
  </tr>`).join("");
  el.innerHTML=`<p style="font-size:12px;color:var(--text2);margin-bottom:12px">All SKUs ranked by full funnel rate YTD. Weighted by promo-days on promotion.</p>`+
  heatKey()+`<div class="tbl-scroll"><table>
    <thead><tr><th style="min-width:28px">#</th><th class="left">SKU</th><th class="left">Category</th><th class="left">Sub-category</th>
    <th>Promos</th><th>Avg apps/day</th><th>Avg orders/day</th><th>App→order %</th><th>Full funnel %</th>
    </tr></thead><tbody>${rows}</tbody></table></div>`;
}

init();
</script>
